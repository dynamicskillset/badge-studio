name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Deploy to VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key "root@$VPS_HOST" \
            "mkdir -p /opt/ghost/sites/dynamicskillset.com/badge-studio"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ "root@$VPS_HOST:/opt/ghost/sites/dynamicskillset.com/badge-studio/"
