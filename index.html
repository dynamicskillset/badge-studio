<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Design and download SVG badges with custom colours, icons, and masks.">
    <link rel="preconnect" href="https://fonts.bunny.net" crossorigin>
    <link rel="stylesheet" href="https://fonts.bunny.net/css2?family=Lora:wght@600&family=Plus+Jakarta+Sans:wght@400;600&display=swap">
    <title>Badge Studio</title>
  </head>
  <body>
    <div class="wrapper">
      <header class="header">
        <h1 class="title">Badge Studio</h1>
      </header>
      <div class="content" id="studio">
        <form id="input">
          <h2 class="subtitle">Configuration</h2>
          <label class="label" for="studio-template">Template</label>
          <p class="item">
            <select name="template" id="studio-template" data-path="./templates">
              <option value="basic">Basic</option>
              <option value="standard">Standard</option>
              <option value="detailed">Detailed</option>
            </select>
          </p>
          <label class="label" for="studio-palette">Colour Palette</label>
          <p class="item">
            <select name="palette" id="studio-palette">
              <option value="classic"
                      data-color-background="#1a2744"
                      data-color-stitching="#c8c8d0"
                      data-color-border="#666680"
                      data-color-detail="#ffffff"
                      data-color-glyph="#ffffff">Classic</option>
              <option value="ocean"
                      data-color-background="#0d4f7a"
                      data-color-stitching="#29a7c5"
                      data-color-border="#29a7c5"
                      data-color-detail="#ffffff"
                      data-color-glyph="#ffffff">Ocean</option>
              <option value="forest"
                      data-color-background="#2d5a27"
                      data-color-stitching="#f0e8d0"
                      data-color-border="#8bc34a"
                      data-color-detail="#ffffff"
                      data-color-glyph="#ffffff">Forest</option>
              <option value="wao"
                      data-color-background="#2F495A"
                      data-color-stitching="#00C399"
                      data-color-border="#16A8E2"
                      data-color-detail="#FFBC42"
                      data-color-glyph="#ffffff">WAO</option>
            </select>
          </p>
          <div id="custom-palette"></div>
          <label class="label" for="studio-mask">Background Mask</label>
          <p class="item">
            <select name="mask" id="studio-mask" data-path="./masks">
              <option value="">None</option>
              <option value="lines">Diagonal Stripes</option>
            </select>
          </p>
          <p class="label">Options</p>
          <p class="item" id="options">
            <i>None</i>
          </p>
          <label class="label" for="studio-glyph">Icon</label>
          <p class="item">
            <select name="glyph" id="studio-glyph">
              <option value="">None</option>
            </select>
          </p>
        </form>
        <div id="output-area">
          <div id="output"></div>
          <button type="button" id="download-btn" class="hidden" aria-label="Download badge">
            <i class="fa-solid fa-download"></i> Download
          </button>
        </div>
      </div>
    </div>

    <footer class="footer">
      <span class="footer-version">v1.0</span>
      <span class="footer-sep">·</span>
      <a href="https://dynamicskillset.com" target="_blank" rel="noopener" class="footer-link">A Dynamic Skillset tool</a>
      <span class="footer-sep">·</span>
      <a href="https://github.com/dynamicskillset/badge-studio" target="_blank" rel="noopener" class="footer-link">Mozilla Public License, v2.0</a>
    </footer>

    <!-- Settings template — kept for future use; not currently shown in UI -->
    <template id="settings-template">
      <div id="settings" role="dialog" aria-modal="true" tabindex="-1" class="overlay hidden" aria-labelledby="settings-title">
        <header class="header">
          <h2 class="title" id="settings-title">Settings</h2>
        </header>
        <div class="panel">
          <h3 class="label">Display</h3>
          <p>
            <select name="display">
              <option value="light">Light</option>
              <option value="dark">Dark</option>
            </select>
          </p>
          <h3 class="label">Preview Size</h3>
          <small>Badge wallets and portfolios display badges at different sizes. Try each size to check your design holds up.</small>
          <p>
            <select name="badge-size">
              <option value="1">Normal</option>
              <option value="0.75">Large</option>
              <option value="0.5">Medium</option>
              <option value="0.25">Small</option>
            </select>
          </p>
        </div>
      </div>
    </template>

    <template id="glyph-selector-template">
      <div id="glyph-selector" role="dialog" aria-modal="true" class="overlay hidden" aria-label="Browse and select an icon" tabindex="-1">
        <div class="header">
          <label class="title">Filter: <input type="search"></label>
        </div>
        <div class="panel">
          <ul>
          </ul>
        </div>
      </div>
    </template>

    <template id="glyph-selector-item-template">
      <li>
        <input type="radio" name="glyph-selector-item" class="hidden">
        <label></label>
      </li>
    </template>

    <template id="option-template">
      <label>
        <input type="checkbox">
        <span>Label</span>
      </label>
    </template>

    <template id="close-button-template">
      <button type="button" class="close fa-solid fa-circle-xmark" aria-label="Close"></button>
    </template>

    <template id="about-template">
      <div id="about" role="dialog" aria-modal="true" tabindex="-1" class="overlay hidden" aria-labelledby="about-title">
        <header class="header">
          <h2 class="title" id="about-title">About</h2>
        </header>
        <div class="panel about-panel">
          <h3>About Badge Studio</h3>
          <p>Badge Studio is an open-source tool for designing custom SVG badges. It was originally created by <a href="https://andrewhayward.net" target="_blank" rel="noopener">Andrew Hayward</a> for Mozilla's Open Badges initiative, and has been modernised and genericised for general use. Icons are provided by <a href="https://fontawesome.com" target="_blank" rel="noopener">Font Awesome</a> (CC BY 4.0).</p>

          <h3>What are Open Badges?</h3>
          <p><a href="https://openbadges.org" target="_blank" rel="noopener">Open Badges</a> are a web-enabled standard for recognising and verifying skills and achievements. Developed by Mozilla and now maintained by <a href="https://www.1edtech.org/standards/ob" target="_blank" rel="noopener">1EdTech</a>, an Open Badge contains metadata about the issuer, recipient, and criteria, making it portable and verifiable across the web.</p>
          <p>The badge graphic you design here can be used as the visual component of an Open Badge issued through any <a href="https://www.1edtech.org/" target="_blank" rel="noopener">1EdTech-certified platform</a>.</p>

          <h3>Downloading your badge</h3>
          <p>Click <strong>Download</strong> below the badge preview to save as PNG (512×512 pixels, ideal for sharing and printing) or SVG (scalable vector, supported by many badge platforms and useful for web embedding or editing in design tools).</p>
        </div>
      </div>
    </template>

    <template id="custom-color-template">
      <label>
        <input type="color">
        <span>Label</span>
      </label>
    </template>

    <template id="download-modal-template">
      <div id="download-modal" role="dialog" aria-modal="true" tabindex="-1" class="overlay hidden" aria-labelledby="download-modal-title">
        <header class="header">
          <h2 class="title" id="download-modal-title">Download badge</h2>
        </header>
        <div class="panel download-panel">
          <button type="button" class="download-option" id="download-png-btn">
            <i class="fa-solid fa-file-image download-option-icon"></i>
            <span class="download-option-format">PNG</span>
            <span class="download-option-desc">A 512×512 pixel image. Use this for uploading to badge platforms, sharing online, or printing.</span>
          </button>
          <button type="button" class="download-option" id="download-svg-btn">
            <i class="fa-solid fa-bezier-curve download-option-icon"></i>
            <span class="download-option-format">SVG</span>
            <span class="download-option-desc">A scalable vector file. Use this for uploading to badge platforms, embedding in websites, or editing in design tools like Inkscape or Illustrator — stays sharp at any size.</span>
          </button>
        </div>
      </div>
    </template>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
